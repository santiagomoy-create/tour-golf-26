<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;font-size:14px;color:var(--tx);background:var(--bg);min-height:100vh}
.shell{display:flex;min-height:100vh}

  display: none;
}

@media (max-width: 768px) {
  body {
    font-size: 13px;
  }

    display: none !important;
  }
  .main {
    margin-left: 0 !important;

  }
  .ph h1 {
    font-size: 22px;
  }

    font-size: 12px;
  }

    gap: 10px !important;
  }
  .card {
    padding: 16px !important;
    border-radius: 12px !important;
  }
  
  /* Mobile Bottom Navigation Bar */
  .bottom-nav {
    display: flex !important;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 64px;
    background: var(--g9);

    display: flex;
    flex-direction: column;
    align-items: center;

  }
  .nav-item-mobile.active span {
    transform: scale(1.1);
  }

  /* Bottom sheet drawer for "More Options" */
  .more-drawer {
    display: flex !important;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 1100;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .more-drawer.open {
    opacity: 1;
    pointer-events: auto;
  }
  .drawer-content {
    background: var(--surf);
    width: 100%;
    max-width: 480px;
    border-top-left-radius: 20px;
    border-top-right-radius: 20px;
    padding: 20px 20px calc(24px + env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.1, 0.76, 0.55, 0.94);
    box-shadow: 0 -8px 24px rgba(0,0,0,0.15);
  }
  .more-drawer.open .drawer-content {
    transform: translateY(0);
  }
  .drawer-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--bdr);
    padding-bottom: 12px;

  .drawer-header h4 {

<script>
// Error catching overlay for easy debugging on mobile and without console access
window.addEventListener('error', function(e) {
  showErrorOverlay(e.error || new Error(e.message));
});
window.addEventListener('unhandledrejection', function(e) {
  showErrorOverlay(e.reason || new Error("Promise rejected"));
});

function showErrorOverlay(err) {
  let overlay = document.getElementById('error-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'error-overlay';
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(20,0,0,0.95);color:#ff5f5f;z-index:999999;padding:24px;box-sizing:border-box;font-family:monospace;overflow-y:auto;display:flex;flex-direction:column;';
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = `
    <h2 style="color:#ff8f8f;margin-top:0;">⚠️ Se detectó un error en la aplicación</h2>
    <p style="color:#ffffff;margin-bottom:16px;">Para ayudarnos a solucionarlo, por favor sácale una captura a esta pantalla y compártela:</p>
    <div style="background:#2a0505;border:1px solid #ff5f5f;padding:12px;border-radius:6px;flex:1;overflow:auto;white-space:pre-wrap;font-size:13px;margin-bottom:16px;color:#ffcdcd;">${err && err.stack ? err.stack : err}</div>
    <button onclick="document.getElementById('error-overlay').remove()" style="padding:10px 20px;background:#ff5f5f;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-size:14px;align-self:flex-start;">Cerrar esta advertencia</button>
  `;
}

// Safe storage wrapper to prevent crashes on file:// protocol in restrictive browsers
const storage = {
  get(key) {
    try { return localStorage.getItem(key); } catch (e) { return this._mem[key] || null; }
  },
  set(key, val) {
    try { localStorage.setItem(key, val); } catch (e) { this._mem[key] = val; }
  },
  remove(key) {
    try { localStorage.removeItem(key); } catch (e) { delete this._mem[key]; }
  },
  _mem: {}
};

let IS_ADMIN = storage.get('golf_is_admin') === 'true';
let APPS_SCRIPT_URL = storage.get('golf_apps_script_url') || '';
const SPREADSHEET_ID = "1h_R6k50cU3W9e8E-53nxmpmCHd771uTh2erYE5lw5pk"; // Ingresa el ID de tu Google Sheet publicado

// GIDs de cada hoja en tu Google Sheet (modificar si los de tu planilla varían)
const GIDS = {

  calendario: "22222222", // Reemplazar con el GID real de tu pestaña 'calendario'
  salidas: "33333333", // Reemplazar con el GID real de tu pestaña 'salidas'
  resultados: "44444444" // Reemplazar con el GID real de tu pestaña 'resultados'
};

// Función para parsear CSV a objetos JSON de manera limpia y robusta
function parseCSV(text) {
  if (text.trim().startsWith("<!DOCTYPE") || text.trim().startsWith("<html")) {
    throw new Error("Se recibió HTML en lugar de CSV. Asegúrate de publicar la planilla en la web (Archivo > Compartir > Publicar en la web).");
  }
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  if (!lines.length) return [];
  
  // Parsear la cabecera
  const headers = lines[0].split(",").map(h => h.replace(/^"|"$/g, "").trim());
  
  return lines.slice(1).map(line => {
    let fields = [];
    let insideQuote = false;
    let currentField = "";
    
    for (let char of line) {
      if (char === '"') {
        insideQuote = !insideQuote;
      } else if (char === ',' && !insideQuote) {
        fields.push(currentField.trim());
        currentField = "";
      } else {
        currentField += char;
      }
    }
    fields.push(currentField.trim());
    
    let obj = {};
    headers.forEach((h, i) => {
      let val = fields[i] || "";
      val = val.replace(/^"|"$/g, ""); // Limpiar comillas
      
      // Auto-conversión de tipos
      if (val.toUpperCase() === "TRUE") val = true;
      else if (val.toUpperCase() === "FALSE") val = false;
      else if (val === "") val = null;
      else if (!isNaN(val)) val = Number(val);
      
      obj[h] = val;
    });
    return obj;
  });
}

// Función principal para refrescar el torneo desde Google Sheets
async function cargarDesdeGoogleSheets() {
  if (!SPREADSHEET_ID || SPREADSHEET_ID === "TU_GOOGLE_SHEET_ID_AQUI") {
    console.log("ℹ️ Usando datos de respaldo locales del Torneo (Google Sheets no configurado).");
    return;
  }
  
  try {
    const fetchTab = async (tabName) => {
      const gid = GIDS[tabName];
      const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/pub?gid=${gid}&output=csv&cachebust=${Date.now()}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Error HTTP: ${res.status} al leer ${tabName}`);
      const text = await res.text();
      return parseCSV(text);
    };

    console.log("⚡ Descargando datos desde Google Sheets...");
    const [playersRaw, coursesRaw, schedRaw, flightsRaw, scoresRaw] = await Promise.all([
      fetchTab("jugadores"),
      fetchTab("canchas"),
      fetchTab("calendario"),
      fetchTab("salidas"),
      fetchTab("resultados")
    ]);

    // 1. Cargar Jugadores
    if (playersRaw && playersRaw.length) {
      TP = playersRaw.map(p => ({
        id: Number(p.id),
        name: p.name,
        short: p.short_name,
        hcp: p.handicap !== null ? Number(p.handicap) : null,
        mat: String(p.matricula || ""),
        ini: p.initials || p.short_name.substring(0, 2).toUpperCase()
      }));
    }

    // 2. Cargar Canchas
    if (coursesRaw && coursesRaw.length) {
      COURSES = coursesRaw.map(c => ({
        id: c.id,
        name: c.name,
        city: c.city,
        par: String(c.par).split(",").map(Number),
        hdi: String(c.hdi).split(",").map(Number),
        slope: Number(c.slope),
        rating: Number(c.rating)
      }));
    }

    // 3. Cargar Calendario
    if (schedRaw && schedRaw.length) {
      SCHED = schedRaw.map(s => ({
        num: Number(s.num),
        date: s.date,
        course: s.course_id || null,
        status: s.status,
        doble: s.is_double === true || String(s.is_double).toUpperCase() === "TRUE"
      }));
    }

    // 4. Reconstruir FD (Resultados y scores por fecha)
    const nuevoFD = {};
    SCHED.forEach(s => {
      const flightsForDate = flightsRaw.filter(f => Number(f.date_num) === s.num);
      const scoresForDate = scoresRaw.filter(sc => Number(sc.date_num) === s.num);
      
      if (s.status === "played" || flightsForDate.length > 0 || scoresForDate.length > 0) {
        const lineas = flightsForDate.map(f => ({
          num: Number(f.flight_num),
          hora: f.tee_time,
          pids: String(f.player_ids).split(",").map(Number)
        }));

        const scores = {};
        scoresForDate.forEach(sc => {
          scores[Number(sc.player_id)] = {
            hcp: Number(sc.handicap),
            holes: String(sc.holes).split(",").map(Number),
            h19: sc.h19 === true || String(sc.h19).toUpperCase() === "TRUE",
            approach: sc.approach === true || String(sc.approach).toUpperCase() === "TRUE",
            hoyoEnUno: sc.hoyo_en_uno === true || String(sc.hoyo_en_uno).toUpperCase() === "TRUE",
            noApp: sc.no_app === true || String(sc.no_app).toUpperCase() === "TRUE",
            noCard: sc.no_card === true || String(sc.no_card).toUpperCase() === "TRUE",
            abandon: sc.abandon === true || String(sc.abandon).toUpperCase() === "TRUE",
            noShow: sc.no_show === true || String(sc.no_show).toUpperCase() === "TRUE",
            is_official: sc.is_official === true || String(sc.is_official).toUpperCase() === "TRUE"
          };
        });

        nuevoFD[s.num] = {
          fecha: s.num,
          course: s.course || null,
          date: s.date,
          lineas,
          scores
        };
      }
    });

    FD = nuevoFD;
    console.log("✓ Base de datos Google Sheets cargada exitosamente.");
  } catch (e) {
    console.error("⚠️ Falló la conexión con Google Sheets. Usando datos estáticos de respaldo:", e);
  }
}

// ════════════════════════════════════════════════════
// CÁLCULOS — verificados contra Excel de Fraile (23 pts)
// Stableford: birdie(neto-1)=3, par=2, bogey=1, doble+=0
// ════════════════════════════════════════════════════
function sph(hcp, hdi){
  // Strokes per hole — distribuye handicap según orden de dificultad
  const a=new Array(18).fill(Math.floor(hcp/18));
  const ex=hcp%18;
  const sorted=[...hdi.entries?.[Symbol.iterator]?.()??hdi.map((v,i)=>({v,i}))].sort?.((x,y)=>x.v-y.v)
    ?? hdi.map((v,i)=>({v,i})).sort((x,y)=>x.v-y.v);
  const si=hdi.map((v,i)=>({v,i})).sort((x,y)=>x.v-y.v);
  for(let k=0;k<ex;k++) a[si[k].i]++;
  return a;
}

function stb(holes, hcp, par, hdi){
  const s=sph(hcp,hdi);
  return holes.reduce((tot,sc,i)=>{
    if (sc <= 0) return tot;
    const diff=(sc-s[i])-par[i];
    return tot+(diff<=-2?4:diff===-1?3:diff===0?2:diff===1?1:0);
  },0);
}

function stbByHole(holes,hcp,par,hdi){
  const s=sph(hcp,hdi);
  return holes.map((sc,i)=>{
    if (sc <= 0) return 0;
    const d=(sc-s[i])-par[i];
    return d<=-2?4:d===-1?3:d===0?2:d===1?1:0;
  });
}

function gross(h){return h.reduce((a,b)=>a+b,0);}
function neto(h,hcp){return gross(h)-hcp;}

function getCourse(id){return COURSES.find(c=>c.id===id)||COURSES[0];}
function getPlayer(id){

  if (p) return p;
  if (typeof liveDateNum !== 'undefined' && FD[liveDateNum] && FD[liveDateNum].scores && FD[liveDateNum].scores[id]) {

    return { id: id, name: sc.name, short: sc.name.split(' ')[0], hcp: sc.hcp, isReplace: true };
  }

    if (FD[fn] && FD[fn].scores && FD[fn].scores[id]) {

      return { id: id, name: sc.name, short: sc.name.split(' ')[0], hcp: sc.hcp, isReplace: true };
    }

}
function getSched(n){return SCHED.find(s=>s.num===n);}

// ════════════════════════════════════════════════════
// ASIGNACIÓN DE PUNTOS CON EMPATES
// ════════════════════════════════════════════════════
function assignPts(ranked, doble){
  const pm=doble?PTS_D:PTS_N;
  const out=[];
  let i=0;
  while(i<ranked.length){
    let j=i;
    while(j<ranked.length-1&&ranked[j].val===ranked[j+1].val) j++;
    const tied=ranked.slice(i,j+1);
    const ptsArr=tied.map((_,k)=>pm[i+k+1]||0);
    const positives=ptsArr.filter(x=>x>0);
    const avg=positives.length&&tied.length>1
      ? Math.round(positives.reduce((a,b)=>a+b,0)/tied.length*10)/10
      : (pm[i+1]||0);
    tied.forEach(r=>out.push({...r,pos:i+1,tpts:tied.length>1&&positives.length?avg:(pm[i+1]||0)}));
    i=j+1;
  }
  return out;
}

// ════════════════════════════════════════════════════
// RESULTADOS POR FECHA
// ════════════════════════════════════════════════════
function getFechaResults(fn){
  const fd=FD[fn]; if(!fd) return [];
  const c=getCourse(fd.course);
  return Object.entries(fd.scores).map(([pid,sc])=>{
    const p=getPlayer(pid);
    const hasCard = !sc.noShow && !sc.abandon && !sc.noCard;
    const g=hasCard ? gross(sc.holes) : 0;
    const n=hasCard ? neto(sc.holes,sc.hcp) : 0;
    const s=hasCard ? stb(sc.holes,sc.hcp,c.par,c.hdi) : 0;
    const sched=getSched(fn), doble=sched?.doble||false;
    
    let bonus=0;
    if(sc.h19)      bonus+=doble?2:1;
    if(sc.approach) bonus+=doble?6:2;
    if(sc.hoyoEnUno)bonus+=doble?24:12;
    if(sc.noApp)    bonus+=doble?-2:-1;
    
    // Aplicar penalizaciones del reglamento
    if(sc.noCard)   bonus+=doble?-4:-2;
    if(sc.abandon)  bonus+=doble?-6:-3;
    if(sc.noShow)   bonus+=doble?-8:-4;
    
    const isOfficial = sc.is_official !== false && String(sc.is_official).toUpperCase() !== "FALSE";
    
    return{
      pid:parseInt(pid)||pid, 
      p, 
      sc, 
      gross:g, 
      net:n, 
      stb:s, 
      bonus, 
      isReplace:sc.isReplace||false,
      hasPenalization: !hasCard,
      isOfficial
    };
  }).filter(Boolean);
}

function getFechaRank(fn, mode){
  const res=getFechaResults(fn);
  const doble=getSched(fn)?.doble||false;
  const elig=res.filter(r=>!r.isReplace);
  
  // Separar jugadores penalizados para que no compitan por puntos de posición
  const validPlayers = elig.filter(r => !r.hasPenalization);
  const penalizedPlayers = elig.filter(r => r.hasPenalization);
  
  const sorted=mode==='stb'
    ?[...validPlayers].sort((a,b)=>b.stb-a.stb)
    :[...validPlayers].sort((a,b)=>a.net-b.net);
    
  const ranked=assignPts(sorted.map(r=>({...r,val:mode==='stb'?r.stb:r.net})),doble);
  
  // Jugadores penalizados reciben 0 puntos de posición (tpts = 0)
  const penalizedRanked = penalizedPlayers.map(r => ({
    ...r,
    pos: '-',
    tpts: 0,
    val: mode === 'stb' ? 0 : 999
  }));
  
  const allRanked = [...ranked, ...penalizedRanked];
  return allRanked.map(r=>({...r,totalPts:r.tpts+r.bonus}));
}

// ════════════════════════════════════════════════════
// LAGUNEADA — best ball neto por línea
// ════════════════════════════════════════════════════
function getLaguneada(fn){
  const fd=FD[fn]; if(!fd||!fd.lineas) return [];
  const c=getCourse(fd.course);
  const results=fd.lineas.map(l=>{
    const bph=c.par.map((_,h)=>{
      const nets=l.pids.map(pid=>{
        const sc=fd.scores[pid];
        if(!sc||sc.noShow||!sc.holes) return 999;
        const s=sph(sc.hcp,c.hdi);
        return sc.holes[h]-s[h];
      }).filter(x=>x<999);
      return nets.length?Math.min(...nets):999;
    });
    if(bph.some(x=>x===999)) return null;
    const parTotal=c.par.reduce((a,b)=>a+b,0);
    const ida=bph.slice(0,9).reduce((a,b)=>a+b,0);
    const vta=bph.slice(9).reduce((a,b)=>a+b,0);
    const tot=bph.reduce((a,b)=>a+b,0);
    return{...l,bph,ida,vta,tot,vs:tot-parTotal};
  }).filter(Boolean);
  return results.sort((a,b)=>a.tot-b.tot).map((l,i)=>({...l,pos:i+1,lagPts:PTS_L[i+1]||0}));
}

// ════════════════════════════════════════════════════
// RANKINGS ACUMULADOS
// ════════════════════════════════════════════════════
function getAccum(){
  const map={};
  TP.forEach(p=>{map[p.id]={pid:p.id,p,stb:0,medal:0,lag:0,mixed:0,fechas:0};});
  Object.keys(FD).forEach(fn=>{
    const n=parseInt(fn);
    getFechaResults(n).filter(r=>!r.isReplace).forEach(r=>{
      if(map[r.pid]){map[r.pid].stb+=r.stb;map[r.pid].fechas++;}
    });
    getFechaRank(n,'medal').forEach(r=>{
      if(map[r.pid]) map[r.pid].medal+=r.totalPts;
    });
    getLaguneada(n).forEach(l=>{
      l.pids.forEach(pid=>{if(map[pid]) map[pid].lag+=l.lagPts;});
    });
  });
  Object.values(map).forEach(r=>{r.mixed=+(r.stb+r.lag).toFixed(1);});
  return Object.values(map).filter(x=>x.fechas>0);
}

function getPlayerStats(pid){
  let geagles=0,gbirdies=0,gpars=0,gbogeys=0,gdbls=0,gworse=0;
  let asist=0,h19c=0,rounds=0,appr=0,henu=0;
  let grossA=[],stbA=[],netA=[];
  const fechaDetail=[];
  Object.entries(FD).sort((a,b)=>parseInt(a[0])-parseInt(b[0])).forEach(([fn,fd])=>{
    const sc=fd.scores[pid]; if(!sc||sc.noShow) return;
    const c=getCourse(fd.course);
    rounds++;asist++;
    if(sc.h19) h19c++;
    if(sc.approach) appr++;
    if(sc.hoyoEnUno) henu++;
    const g=gross(sc.holes),n2=neto(sc.holes,sc.hcp);
    const s2=stb(sc.holes,sc.hcp,c.par,c.hdi);
    grossA.push(g);netA.push(n2);stbA.push(s2);
    let fEagles=0,fBirdies=0,fPars=0,fBogeys=0,fDbls=0,fWorse=0;
    sc.holes.forEach((h,i)=>{
      const d=h-c.par[i];
      if(d<=-2){geagles++;fEagles++;}
      else if(d===-1){gbirdies++;fBirdies++;}
      else if(d===0){gpars++;fPars++;}
      else if(d===1){gbogeys++;fBogeys++;}
      else if(d===2){gdbls++;fDbls++;}
      else{gworse++;fWorse++;}
    });
    fechaDetail.push({fn:parseInt(fn),gross:g,net:n2,stb:s2,
      eagles:fEagles,birds:fBirdies,pars:fPars,bogs:fBogeys,dbls:fDbls,worse:fWorse});
  });
  const avg=a=>a.length?+(a.reduce((x,y)=>x+y,0)/a.length).toFixed(1):null;
  return{geagles,gbirdies,gpars,gbogeys,gdbls,gworse,
    asist,h19c,rounds,appr,henu,fechaDetail,
    avgGross:avg(grossA),avgStb:avg(stbA),
    bestGross:grossA.length?Math.min(...grossA):null,grossA,stbA};
}

function swRT(m,el){
  document.querySelectorAll('#MC .tab').forEach(t=>t.classList.remove('active'));

}
function renderRT(mode){
  const el=document.getElementById('RC');
  const all=getAccum();
  const keyMap={stb:'stb',medal:'medal',lag:'lag',mixed:'mixed'};
  const k=keyMap[mode];
  const sorted=[...all].sort((a,b)=>b[k]-a[k]);
  const descMap={
    stb:'Stableford: Eagle=4 · Birdie=3 · Par=2 · Bogey=1 · Doble+=0 — ventaja hoyo por hoyo. Se acumula el score STB real de cada fecha. El que más puntos sume en las 6 fechas gana.',
    medal:'Medal: puntos por posición en score neto (12-9-7-5-4-3-2-1, doble en fecha 6). Empates: se promedian los puntos.',
    lag:'Laguneada: línea ganadora +6pts · 2da +3pts · 3ra 0pts — suma a cada jugador de la línea por fecha.',
    mixed:'Mixto: suma de puntos Stableford reales + puntos Laguneada acumulados.'
  };
  el.innerHTML=`
  <div class="alert ai" style="font-size:12px">${descMap[mode]}</div>
  <div class="card"><table>
    <thead><tr><th>#</th><th>Jugador</th><th>HCP</th><th>Fechas</th>
    ${SCHED.map(s=>`<th style="text-align:center">F${s.num}${s.doble?' 2x':''}</th>`).join('')}
    <th>Total</th></tr></thead>
    <tbody>${sorted.map((r,i)=>{
      const cells=SCHED.map(s=>{
        if(!FD[s.num]) return`<td style="text-align:center;color:var(--txm)">—</td>`;
        if(mode==='stb'){
          const fr=getFechaResults(s.num).find(x=>x.pid==r.pid);
          return fr?`<td style="text-align:center;font-size:12px;font-family:'DM Mono',monospace">${fr.stb}</td>`:`<td style="text-align:center;color:var(--txm)">—</td>`;
        }
        if(mode==='medal'){
          const fr=getFechaRank(s.num,'medal').find(x=>x.pid==r.pid);
          return fr?`<td style="text-align:center;font-size:12px">${fr.totalPts>0?'+'+fr.totalPts:fr.totalPts}</td>`:`<td style="text-align:center;color:var(--txm)">—</td>`;
        }
        if(mode==='lag'){
          const lr=getLaguneada(s.num).find(l=>l.pids.includes(r.pid));
          const lp=lr?.lagPts??null;
          return lp!=null?`<td style="text-align:center;font-size:12px">${lp>0?'+'+lp:lp}</td>`:`<td style="text-align:center;color:var(--txm)">—</td>`;
        }
        const fr=getFechaResults(s.num).find(x=>x.pid==r.pid);
        const sp=fr?.stb??0;
        const lr=getLaguneada(s.num).find(l=>l.pids.includes(r.pid));
        const lp=lr?.lagPts??0;
        const tot=sp+lp;
        return fr?`<td style="text-align:center;font-size:12px">${tot}</td>`:`<td style="text-align:center;color:var(--txm)">—</td>`;

        <td>${pb(i+1)}</td><td><strong>${r.p.name}</strong></td>
        <td>${r.p.hcp!=null?r.p.hcp:'TBD'}</td><td>${r.fechas}</td>
        ${cells}<td>${ptb(r[k])}</td>
      </tr>`;
    }).join('')}</tbody>

    <div class="ct">Desglose mixto — F1</div>

    <tbody>${sorted.map((r,i)=>`<tr class="${i<3?'hl':''}"><td>${pb(i+1)}</td><td>${r.p.name}</td><td style="font-family:'DM Mono',monospace">${r.stb}</td><td>${ptb(r.lag)}</td><td><strong style="color:var(--acc)">${r.mixed}</strong></td></tr>`).join('')}</tbody>
    </table></div>`:''}`;
}

function stablefordByHoleArr(holes,hcp,par,hdi){
  const s=sph(hcp,hdi);
  return holes.map((sc,i)=>{
    if (sc <= 0) return 0;
    const d=(sc-s[i])-par[i];
    return d<=-2?4:d===-1?3:d===0?2:d===1?1:0;
  });
}

function rFD(n){
  const el=document.getElementById('FD');

    <div class="tab" onclick="swFT('tarjetas',this,${n})">📋 Tarjetas</div>
  </div>

  rFT('stb',n);
}

            <tr style="background:var(--g0)"><td style="text-align:left;font-weight:600;color:var(--g8)">Neto</td>${netoH.map((n,i)=>{const d=n-c.par[i];const cls=d<=-1?'sb2':d===0?'sp':d===1?'sbo':'sd';return`<td><span class="sc-cell ${cls}">${n}</span></td>`;}).join('')}<td style="font-weight:600;color:var(--g8)">${nIda}</td><td style="font-weight:600;color:var(--g8)">${nVta}</td><td style="font-weight:600;color:var(--g8)">${r.net}</td></tr>
          </tbody>
        </table></div>
      </div>`;
    }).join('')}`;

  } else if(mode==='lag'){
    const lag=getLaguneada(fn);
    if(!lag.length){el.innerHTML=`<div class="alert ai">Sin líneas configuradas.</div>`;return;}
    const hW=c.par.map((_,h)=>{
      const vals=lag.map(l=>l.bph[h]);
      const mn=Math.min(...vals);
      return vals.map(v=>v===mn&&vals.filter(x=>x===mn).length===1?'w':v===mn?'t':'l');
    });
    const lCls=['l1b','l2b','l3b'];
    const mdl=['🥇','🥈','🥉'];
    el.innerHTML=`
    <div class="mg" style="margin-bottom:16px">
      ${lag.map((l,i)=>{
        const names=l.pids.map(id=>getPlayer(id)?.short||'?').join(', ');
        return`<div class="mc">
          <div class="ml">${mdl[i]} Línea ${l.num} — ${l.hora}</div>
          <div class="mv" style="font-size:20px">${l.tot}</div>
          <div class="ms">vs Par: ${l.vs>=0?'+'+l.vs:l.vs} · <strong>+${l.lagPts} pts</strong>/jugador</div>
          <div style="margin-top:5px;font-size:11px;color:var(--txm)">${names}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="card sct" style="margin-bottom:20px"><table>
      <thead>
        <tr><th>Línea</th>${c.par.map((_,i)=>`<th>${i+1}</th>`).join('')}<th>IDA</th><th>VTA</th><th>TOT</th><th>vs Par</th><th>Lag pts</th></tr>
        <tr style="background:var(--gray0)"><th style="font-size:11px;color:var(--txm)">Par</th>${c.par.map(p=>`<td style="font-size:11px;color:var(--txm)">${p}</td>`).join('')}<td style="font-size:11px;color:var(--txm)">${pIda}</td><td style="font-size:11px;color:var(--txm)">${pVta}</td><td style="font-size:11px;color:var(--txm)">${parTotal}</td><td colspan="2"></td></tr>
      </thead>
      <tbody>${lag.map((l,li)=>{
        const names=l.pids.map(id=>getPlayer(id)?.short||'?').join(', ');
        return`<tr>
          <td><span class="bdg ${lCls[li%3]}">L${l.num}</span><div style="font-size:10px;color:var(--txm);margin-top:3px">${names}</div></td>
          ${l.bph.map((v,h)=>{const st=hW[h][li];const bg=st==='w'?'background:var(--g0);color:var(--g8)':st==='t'?'background:var(--gray0);color:var(--gray6)':'';return`<td style="${bg};font-family:'DM Mono',monospace">${v}</td>`;}).join('')}
          <td><strong>${l.ida}</strong></td><td><strong>${l.vta}</strong></td><td><strong>${l.tot}</strong></td>
          <td>${l.vs>=0?'+'+l.vs:l.vs}</td><td><strong>${ptb(l.lagPts)}</strong></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;

  } else {
    // Tarjetas crudas
    el.innerHTML=`
    <div class="card sct"><table>
      <thead>
        <tr><th>Jugador</th>${c.par.map((_,i)=>`<th>${i+1}</th>`).join('')}<th>IDA</th><th>VTA</th><th>TOT</th><th>HCP</th><th>NETO</th><th>STB</th></tr>
        <tr style="background:var(--gray0)"><th style="font-size:11px;color:var(--txm)">Par</th>${c.par.map(p=>`<td style="font-size:11px;color:var(--txm)">${p}</td>`).join('')}<td style="font-size:11px;color:var(--txm)">${pIda}</td><td style="font-size:11px;color:var(--txm)">${pVta}</td><td style="font-size:11px;color:var(--txm)">${parTotal}</td><td colspan="3"></td></tr>
      </thead>
      <tbody>${Object.entries(fd.scores).map(([pid,sc])=>{
        const p=getPlayer(pid);
        if(!sc.holes) return '';
        const g=gross(sc.holes),n=neto(sc.holes,sc.hcp);
        const s=stb(sc.holes,sc.hcp,c.par,c.hdi);
        const ida=sc.holes.slice(0,9).reduce((a,b)=>a+b,0);
        const vta=sc.holes.slice(9).reduce((a,b)=>a+b,0);
        return`<tr>
          <td><strong>${p?.short||sc.name||'?'}</strong>${sc.isReplace?'<span class="bdg ba" style="font-size:9px;margin-left:4px">R</span>':''}<br><span style="font-size:10px;color:var(--txm)">hcp ${sc.hcp}</span></td>
          ${sc.holes.map((h,i)=>`<td><span class="sc-cell ${scClass(h,c.par[i])}">${h}</span></td>`).join('')}
          <td>${mono(ida)}</td><td>${mono(vta)}</td><td>${mono(g)}</td>
          <td>${sc.hcp}</td><td>${mono(n)}</td><td>${stb_badge(s)}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  }
}

function hDrop(e){e.preventDefault();document.getElementById('uz').classList.remove('dv');hFiles(e.dataTransfer.files);}
function hFiles(files){Array.from(files).forEach(f=>{const r=new FileReader();r.onload=ev=>analyzeImg(ev.target.result,f.name);r.readAsDataURL(f);});}

async function analyzeImg(dataUrl,fname){
  const safeId=fname.replace(/\W/g,'_');
  const uq=document.getElementById('uq');
  const div=document.createElement('div');
  div.style.cssText='display:flex;align-items:center;gap:12px;padding:10px;border:1px solid var(--bdr);border-radius:var(--rad);margin-bottom:8px;background:var(--bg)';
  div.innerHTML=`<img src="${dataUrl}" style="width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--bdr)">
    <div style="flex:1"><div style="font-size:13px;font-weight:500">${fname}</div>
    <div style="font-size:12px;color:var(--txm)" id="st-${safeId}">Analizando tarjeta con Gemini...</div></div>
    <div id="re-${safeId}"></div>`;
  uq.appendChild(div);
  
  if (!APPS_SCRIPT_URL) {
    document.getElementById(`st-${safeId}`).textContent = "Falta configurar la URL de Apps Script en Config.";
    document.getElementById(`st-${safeId}`).style.color = "var(--r8)";
    document.getElementById(`re-${safeId}`).innerHTML = `<button class="btn btn-s" onclick="openAdminSettingsModal()">Configurar</button>`;
    return;
  }

  const b64=dataUrl.split(',')[1];
  const mt=dataUrl.split(';')[0].split(':')[1]||'image/jpeg';
  
  try{
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'parseCard',
        imageBase64: b64,
        mimeType: mt
      })
    });
    
    const data = await resp.json();
    if (!data.success) {
      throw new Error(data.error || "Error analizando tarjeta.");
    }
    
    const parsed = data.data;
    const matched=matchP(parsed.playerName);
    const pid=matched?matched.id:'r_'+Date.now();
    const hcp=parsed.hcp??matched?.hcp??0;
    
    CS.scores[pid]={
      hcp,
      holes:parsed.holes||new Array(18).fill(0),
      h19:false,
      approach:false,
      hoyoEnUno:false,
      noApp:false,
      noCard:false,
      abandon:false,
      noShow:false,
      name:parsed.playerName||'Desconocido',
      isReplace:!matched
    };
    
    const cid=document.getElementById('c-course')?.value;
    if(parsed.par?.every(p=>p!=null)&&parsed.hdi?.every(h=>h!=null)){
      const ex=COURSES.find(c=>c.id===cid);
      if(ex){ex.par=parsed.par;ex.hdi=parsed.hdi;}
    }
    
    document.getElementById(`st-${safeId}`).textContent=matched
      ?`✓ ${matched.name} — HCP ${hcp} — Gross ${parsed.gross || gross(parsed.holes)}`
      :`⚠ "${parsed.playerName}" no está en el plantel — cargado como reemplazante`;
    document.getElementById(`st-${safeId}`).style.color=matched?'var(--g7)':'var(--a6)';
    document.getElementById(`re-${safeId}`).innerHTML=`<button class="btn btn-s" onclick="openSM('${pid}')">Revisar</button>`;
    rPL();
  }catch(err){
    console.error(err);
    document.getElementById(`st-${safeId}`).textContent=`Error de IA: ${err.message}.`;
    document.getElementById(`st-${safeId}`).style.color='var(--r8)';
    document.getElementById(`re-${safeId}`).innerHTML=`<button class="btn btn-s" onclick="openAddP()">Manual</button>`;
  }
}


function matchP(name){
  if(!name) return null;
  const n=name.toLowerCase().trim();
  return TP.find(p=>{
    const pn=p.name.toLowerCase(),ps=p.short.toLowerCase();
    const last=pn.split(' ').pop(),nLast=n.split(' ').pop();
    return pn.includes(n)||n.includes(pn)||last===nLast||ps===n||n.includes(last);
  });
}

function addL(){
  CS.lc++;const num=CS.lc;
  const lc=document.getElementById('LC');
  if(lc.querySelector('.alert')) lc.innerHTML='';
  const d=document.createElement('div');
  d.id=`L-${num}`;d.style.cssText='border:1px solid var(--bdr);border-radius:var(--rad);padding:14px;margin-bottom:10px';
  d.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <strong>Línea ${num}</strong><button class="btn btn-s btn-d" onclick="remL(${num})">Eliminar</button>
  </div>
  <div class="fg"><label class="fl">Horario</label><input type="text" class="fc" id="h-${num}" placeholder="12:00" style="max-width:140px"></div>
  <div style="font-size:12px;color:var(--tx2)">Jugadores: se asignan al cargar sus tarjetas</div>`;
  lc.appendChild(d);
  if(!CS.lineas.find(l=>l.num===num)) CS.lineas.push({num,hora:'',pids:[]});
}
function remL(n){document.getElementById(`L-${n}`)?.remove();CS.lineas=CS.lineas.filter(l=>l.num!==n);}

function onPS(s){
  document.getElementById('nf').classList.toggle('hidden',s.value!=='new');
  if(s.value!=='new'){const p=TP.find(x=>x.id===parseInt(s.value));if(p&&p.hcp!=null)document.getElementById('mh').value=p.hcp;}
}
function confAddP(){
  const sel=document.getElementById('mp').value;
  const ln=parseInt(document.getElementById('ml').value)||1;
  const hcp=parseInt(document.getElementById('mh').value)||0;
  let pid,name,isReplace=false;
  if(sel==='new'){pid='r_'+Date.now();name=document.getElementById('mn').value||'Reemplazante';isReplace=true;}
  else{pid=parseInt(sel);name=TP.find(x=>x.id===pid)?.name||'?';}
  const l=CS.lineas.find(x=>x.num===ln);
  if(l&&!l.pids.includes(pid)) l.pids.push(pid);
  CS.scores[pid]={hcp,holes:new Array(18).fill(0),h19:false,approach:false,hoyoEnUno:false,noApp:false,noCard:false,abandon:false,noShow:false,name,isReplace};
  closeMD();rPL();
}

function updateHcpDirect(pid, val) {
  const hcp = parseInt(val) || 0;
  if (CS.scores[pid]) {
    CS.scores[pid].hcp = hcp;
  }
}

function toggleEventDirect(pid, field) {
  if (CS.scores[pid]) {
    CS.scores[pid][field] = !CS.scores[pid][field];
    rPL();
  }
}

function changePenaltyDirect(pid, val) {
  if (CS.scores[pid]) {
    CS.scores[pid].noApp = val === 'noApp';
    CS.scores[pid].noCard = val === 'noCard';
    CS.scores[pid].abandon = val === 'abandon';
    CS.scores[pid].noShow = val === 'noShow';
    
    if (val === 'noShow') {
      CS.scores[pid].holes = new Array(18).fill(0);
    }
    rPL();
  }
}

function rPL(){
  const el=document.getElementById('PL');
  const pids=Object.keys(CS.scores);
  if(!pids.length){el.innerHTML=`<div class="alert ai">Sin jugadores cargados aún.</div>`;return;}
  const cid=document.getElementById('c-course')?.value||'cnsi';
  const c=getCourse(cid);
  
  let html = `<div class="tw">
    <table style="min-width: 800px;">
      <thead>
        <tr>
          <th>Jugador</th>
          <th style="width: 80px;">HCP</th>
          <th style="width: 200px; text-align: center;">Eventos Especiales</th>
          <th style="width: 140px;">Estado / Penalización</th>
          <th style="width: 140px; text-align: center;">Score Parcial</th>
          <th style="text-align: right;">Acciones</th>
        </tr>
      </thead>
      <tbody>`;
      
  pids.forEach(pid => {
    const sc=CS.scores[pid];
    const p=getPlayer(pid);
    const name=p?.name||sc.name||'?';
    
    const has=sc.holes?.some(h=>h>0);
    const g=has?gross(sc.holes):0;
    const s=has?stb(sc.holes,sc.hcp,c.par,c.hdi):0;
    
    let scoreDisplay = `<span style="color:var(--txm)">Sin score</span>`;
    if (sc.noShow) {
      scoreDisplay = `<span class="bdg br">No Show</span>`;
    } else if (sc.abandon) {
      scoreDisplay = `<span class="bdg br">Abandono</span>`;
    } else if (has) {
      scoreDisplay = `<strong style="font-family:'DM Mono',monospace">${g}</strong> golpes <span class="bdg bg" style="margin-left:4px;">${s} STB</span>`;
    }
    
    const activePen = sc.noShow ? 'noShow' : sc.abandon ? 'abandon' : sc.noCard ? 'noCard' : sc.noApp ? 'noApp' : 'none';

    html += `
      <tr>
        <td>
          <div style="font-weight: 600; font-size: 13px;">${name}</div>
          ${sc.isReplace ? `<span class="bdg ba" style="font-size:9px; padding: 1px 4px; margin-top:2px;">Reemplazante</span>` : ''}
        </td>
        <td>
          <input type="number" class="fc fc-s" style="width:55px;" value="${sc.hcp}" oninput="updateHcpDirect('${pid}', this.value)" min="0" max="54">
        </td>
        <td>
          <div style="display:flex; gap:6px; justify-content: center;">
            <div class="ev-tog fc-s ${sc.h19?'on':''}" onclick="toggleEventDirect('${pid}', 'h19')">H19</div>
            <div class="ev-tog fc-s ${sc.approach?'on':''}" onclick="toggleEventDirect('${pid}', 'approach')">Appr</div>
            <div class="ev-tog fc-s ${sc.hoyoEnUno?'on':''}" onclick="toggleEventDirect('${pid}', 'hoyoEnUno')">H1</div>
          </div>
        </td>
        <td>
          <select class="fc fc-s" onchange="changePenaltyDirect('${pid}', this.value)" style="width: 120px;">
            <option value="none" ${activePen === 'none' ? 'selected' : ''}>Normal</option>
            <option value="noApp" ${activePen === 'noApp' ? 'selected' : ''}>Sin App (-1)</option>
            <option value="noCard" ${activePen === 'noCard' ? 'selected' : ''}>Sin Tarjeta (-2)</option>
            <option value="abandon" ${activePen === 'abandon' ? 'selected' : ''}>Abandono (-3)</option>
            <option value="noShow" ${activePen === 'noShow' ? 'selected' : ''}>No Show (-4)</option>
          </select>
        </td>
        <td style="text-align: center;">
          ${scoreDisplay}
        </td>
        <td style="text-align: right;">
          <div style="display: flex; gap: 6px; justify-content: flex-end;">
            <button class="btn btn-s" onclick="openSM('${pid}')" ${sc.noShow ? 'disabled' : ''}>✏️ Hoyo a hoyo</button>
            <button class="btn btn-s btn-d" onclick="remP('${pid}')">×</button>
          </div>
        </td>
      </tr>
    `;
  });
  
  html += `</tbody></table></div>`;
  el.innerHTML = html;
}
function remP(pid){delete CS.scores[pid];CS.lineas.forEach(l=>{l.pids=l.pids.filter(x=>x!=pid);});rPL();}

  const sc=CS.scores[pid];

        <div class="ev-tog pen ${sc.noShow?'on':''}" id="ev-noShow" onclick="this.classList.toggle('on')">No se presentó (−4)</div>

    </div>
    <div class="mf"><button class="btn" onclick="closeMD()">Cancelar</button><button class="btn btn-p" onclick="saveSM('${pid}')">Guardar tarjeta</button></div>
  </div></div>`;
  c.par.forEach((par,i)=>{const inp=document.getElementById(`sh${i+1}`);if(inp&&sc.holes[i]>0)cSI(inp,par);});

}

function cSI(inp,par){
  const v=parseInt(inp.value);
  if(!isNaN(v)){
    if(v<=par-2)      inp.style.cssText='background:var(--a0);color:var(--a8);border-color:var(--a1)';
    else if(v===par-1)inp.style.cssText='background:var(--g0);color:var(--g8);border-color:var(--g1)';
    else if(v===par)  inp.style.cssText='';
    else if(v===par+1)inp.style.cssText='background:var(--b0);color:var(--b8);border-color:var(--b2)';
    else              inp.style.cssText='background:var(--r0);color:var(--r8);border-color:var(--r2)';
  }
}
function updPrev(){
  const el=document.getElementById('prev');if(!el)return;
  const cid=document.getElementById('c-course')?.value||'cnsi';
  const c=getCourse(cid);
  const holes=[],hcp=parseInt(document.getElementById('sh')?.value)||0;
  for(let i=1;i<=18;i++){const v=parseInt(document.getElementById(`sh${i}`)?.value);holes.push(isNaN(v)?c.par[i-1]:v);}
  const g=gross(holes),n=neto(holes,hcp),s=stb(holes,hcp,c.par,c.hdi);
  const pt=c.par.reduce((a,b)=>a+b,0),vp=n-pt;
  el.innerHTML=`Gross: <strong>${g}</strong> &nbsp;·&nbsp; Neto: <strong>${n}</strong> &nbsp;·&nbsp; vs Par: <strong>${vp>=0?'+'+vp:vp}</strong> &nbsp;·&nbsp; <span style="color:var(--g7);font-weight:600">Stableford: ${s} pts</span>`;
}
function saveSM(pid){
  const cid=document.getElementById('c-course')?.value||'cnsi';
  const c=getCourse(cid);
  const holes=[],hcp=parseInt(document.getElementById('sh').value)||0;
  for(let i=1;i<=18;i++){const v=parseInt(document.getElementById(`sh${i}`)?.value);holes.push(isNaN(v)?0:v);}
  const evs=['h19','approach','hoyoEnUno','noApp','noCard','abandon','noShow'];
  const ev={};evs.forEach(id=>{ev[id]=document.getElementById('ev-'+id)?.classList.contains('on')||false;});
  if(CS.scores[pid]) Object.assign(CS.scores[pid],{hcp,holes,...ev});
  closeMD();rPL();
}
async function saveF(){
  const fn=parseInt(document.getElementById('c-fn').value);
  const course=document.getElementById('c-course').value;
  const date=document.getElementById('c-date').value;
  
  CS.lineas.forEach(l=>{
    const h=document.getElementById(`h-${l.num}`);
    if(h) l.hora=h.value;
  });
  
  FD[fn]={
    fecha:fn,
    course,
    date,
    lineas:JSON.parse(JSON.stringify(CS.lineas)),
    scores:JSON.parse(JSON.stringify(CS.scores))
  };
  
  // Set in-memory is_official flags to true since admin is validating!
  Object.values(FD[fn].scores).forEach(sc => {
    sc.is_official = true;
  });
  
  const sc=SCHED.find(s=>s.num===fn);
  if(sc){
    sc.status='played';
    if(course) sc.course=course;
    if(date) sc.date=date;
  }
  
  if (APPS_SCRIPT_URL) {
    try {
      const btn = document.querySelector('button[onclick="saveF()"]');
      if (btn) {
        btn.disabled = true;
        btn.textContent = "Sincronizando con Google Sheets...";
      }
      
      const resp = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'saveOfficial',
          pin: 'golf2026',
          dateNum: fn,
          courseId: course,
          dateStr: date,
          lineas: CS.lineas,
          scores: CS.scores
        })
      });
      const data = await resp.json();
      if (data.success) {
        alert("✓ Fecha guardada y sincronizada correctamente en Google Sheets.");
      } else {
        alert("⚠ Se guardó en local, pero falló la sincronización: " + data.error);
      }
    } catch (err) {
      console.error(err);
      alert("⚠ Se guardó en local, pero no se pudo conectar con Google Sheets. Comprobá tu URL.");
    }
  } else {
    alert("✓ Fecha guardada localmente (URL de Google Sheets no configurada).");
  }
  
  nav('fechas');
}

  const niCarga = document.getElementById('ni-sb-carga');
  const niAdminBtn = document.getElementById('ni-admin-btn');
  if (niCarga) {
    if (IS_ADMIN) {
      niCarga.classList.remove('hidden');
    } else {
      niCarga.classList.add('hidden');
    }
  }
  if (niAdminBtn) {
    niAdminBtn.innerHTML = IS_ADMIN ? `⚙️ <span>Admin Config</span>` : `🔒 <span>Admin</span>`;
    niAdminBtn.onclick = IS_ADMIN ? openAdminSettingsModal : openAdminModal;
  }

  // Bottom Nav (Mobile)
  const bottomNav = document.querySelector('.bottom-nav');
  if (bottomNav) {
    if (IS_ADMIN) {
      bottomNav.innerHTML = `
        <div class="nav-item-mobile ${CUR==='dashboard'?'active':''}" onclick="navMobile('dashboard')"><span>🏠</span>Dashboard</div>
        <div class="nav-item-mobile ${CUR==='ranking'?'active':''}" onclick="navMobile('ranking')"><span>🏆</span>Rankings</div>
        <div class="nav-item-mobile ${CUR==='fechas'?'active':''}" onclick="navMobile('fechas')"><span>📅</span>Fechas</div>
        <div class="nav-item-mobile ${CUR==='carga'?'active':''}" onclick="navMobile('carga')"><span>✏️</span>Cargar</div>
        <div class="nav-item-mobile" onclick="toggleMoreMenu()"><span>➕</span>Más</div>
      `;
    } else {
      bottomNav.innerHTML = `
        <div class="nav-item-mobile ${CUR==='dashboard'?'active':''}" onclick="navMobile('dashboard')"><span>🏠</span>Dashboard</div>
        <div class="nav-item-mobile ${CUR==='ranking'?'active':''}" onclick="navMobile('ranking')"><span>🏆</span>Rankings</div>
        <div class="nav-item-mobile ${CUR==='fechas'?'active':''}" onclick="navMobile('fechas')"><span>📅</span>Fechas</div>
        <div class="nav-item-mobile ${CUR==='live'?'active':''}" onclick="navMobile('live')"><span>⛳</span>En Vivo</div>
        <div class="nav-item-mobile" onclick="toggleMoreMenu()"><span>➕</span>Más</div>
      `;
    }
  }

  // Drawer Menu (Mobile)
  const drawerBody = document.querySelector('.drawer-body');
  if (drawerBody) {
    let html = '';
    if (IS_ADMIN) {
      html += `
        <div class="drawer-item" onclick="navMobile('live')">⛳ Marcador en Vivo</div>
        <div class="drawer-item" onclick="navMobile('jugadores')">👤 Plantel Jugadores</div>
        <div class="drawer-item" onclick="navMobile('stats')">📊 Estadísticas</div>
        <div class="drawer-item" onclick="navMobile('canchas')">🗺️ Canchas</div>
        <div class="drawer-item" style="border-top:1px solid var(--bdr);margin-top:8px" onclick="openAdminSettingsModal()">⚙️ Configuración Admin</div>
        <div class="drawer-item" style="color:var(--r8)" onclick="logoutAdmin()">🔓 Cerrar Sesión Admin</div>
      `;
    } else {
      html += `
        <div class="drawer-item" onclick="navMobile('jugadores')">👤 Plantel Jugadores</div>
        <div class="drawer-item" onclick="navMobile('stats')">📊 Estadísticas</div>
        <div class="drawer-item" onclick="navMobile('canchas')">🗺️ Canchas</div>
        <div class="drawer-item" style="border-top:1px solid var(--bdr);margin-top:8px;color:var(--a6)" onclick="openAdminModal()">🔒 Ingreso Admin</div>
      `;
    }
    drawerBody.innerHTML = html;
  }
}

function openAdminModal() {
  document.getElementById('MOD').innerHTML = `
    <div class="mo" onclick="closeM(event)">
      <div class="md" style="max-width: 400px;">
        <div class="mh">
          <h3>Ingreso Administrador</h3>
          <button class="mc-btn" onclick="closeMD()">×</button>
        </div>
        <div class="mb">
          <div class="alert ai">Introduce el PIN de administrador para habilitar la carga oficial de fechas.</div>
          <div class="fg">
            <label class="fl">PIN de Admin</label>
            <input type="password" class="fc" id="admin-pin-input" placeholder="••••••••">
          </div>
          <div id="login-error" style="color:var(--r8); font-size:12px; margin-top:5px; font-weight:500;" class="hidden">PIN incorrecto. Reintentá.</div>
        </div>
        <div class="mf">
          <button class="btn" onclick="closeMD()">Cancelar</button>
          <button class="btn btn-p" onclick="loginAdmin()">Ingresar</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('admin-pin-input').focus();
  document.getElementById('admin-pin-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loginAdmin();
  });
}

function loginAdmin() {
  const pin = document.getElementById('admin-pin-input').value;
  if (pin === 'golf2026') {
    IS_ADMIN = true;
    storage.set('golf_is_admin', 'true');
    closeMD();
    updateNavUI();
    alert("¡Ingreso exitoso! Modo Administrador activado.");
    nav('carga');
  } else {
    const err = document.getElementById('login-error');
    if (err) err.classList.remove('hidden');
  }
}

function logoutAdmin() {
  IS_ADMIN = false;
  storage.remove('golf_is_admin');
  closeMoreMenuForce();
  updateNavUI();
  alert("Cerraste sesión como administrador.");
  nav('dashboard');
}

function openAdminSettingsModal() {
  closeMoreMenuForce();
  document.getElementById('MOD').innerHTML = `
    <div class="mo" onclick="closeM(event)">
      <div class="md" style="max-width: 500px;">
        <div class="mh">
          <h3>Configuración de Administrador</h3>
          <button class="mc-btn" onclick="closeMD()">×</button>
        </div>
        <div class="mb">
          <div class="fg">
            <label class="fl">URL del Web App de Google Apps Script</label>
            <input type="text" class="fc" id="admin-url-input" placeholder="https://script.google.com/macros/s/.../exec" value="${APPS_SCRIPT_URL}">
            <div style="font-size:11px;color:var(--txm);margin-top:4px;">Introducí la URL del Web App publicada en tu Apps Script para guardar y sincronizar en vivo.</div>
          </div>
        </div>
        <div class="mf">
          <button class="btn" onclick="closeMD()">Cancelar</button>
          <button class="btn btn-p" onclick="saveAdminSettings()">Guardar Configuración</button>
        </div>
      </div>
    </div>
  `;
}

function saveAdminSettings() {
  const url = document.getElementById('admin-url-input').value.trim();
  APPS_SCRIPT_URL = url;
  storage.set('golf_apps_script_url', url);
  closeMD();
  alert("Configuración de Apps Script guardada correctamente.");
  cargarDesdeGoogleSheets().then(() => {
    nav('dashboard');
  });
}

// ════════════════════════════════════════════════════
// CARGA EN VIVO (PLAYERS & TRUSTED SCORING)
// ════════════════════════════════════════════════════
let liveHole = 1;
let livePlayerId = null;
let liveDateNum = null;
let liveHoles = new Array(18).fill(0);
let syncStatus = 'idle';
let liveSyncTimeout = null;

function rLive(el) {
  const activeDates = SCHED.filter(s => s.status === 'upcoming' || s.status === 'played');
  if (!liveDateNum && activeDates.length > 0) {
    const upcoming = activeDates.find(s => s.status === 'upcoming');
    liveDateNum = upcoming ? upcoming.num : activeDates[activeDates.length - 1].num;
  } else if (!liveDateNum) {
    liveDateNum = 1;
  }

  let selectPlayerHtml = `
    <option value="" disabled ${!livePlayerId ? 'selected' : ''}>-- Seleccioná tu nombre --</option>
  `;
  TP.forEach(p => {
    selectPlayerHtml += `<option value="${p.id}" ${livePlayerId == p.id ? 'selected' : ''}>${p.name}</option>`;
  });
  const fd = FD[liveDateNum];
  if (fd && fd.scores) {
    Object.entries(fd.scores).forEach(([pid, sc]) => {
      if (sc.isReplace || String(pid).startsWith('r_')) {
        selectPlayerHtml += `<option value="${pid}" ${livePlayerId == pid ? 'selected' : ''}>${sc.name} (Invitado)</option>`;
      }
    });
  }
  selectPlayerHtml += `<option value="new_replace">+ Registrar Jugador Invitado / Reemplazo...</option>`;

  let selectDateHtml = '';
  SCHED.forEach(s => {
    selectDateHtml += `<option value="${s.num}" ${liveDateNum == s.num ? 'selected' : ''}>Fecha ${s.num} — ${s.date} (${s.status === 'played' ? 'Jugada' : s.status === 'upcoming' ? 'Activa' : 'Pendiente'})</option>`;
  });

  el.innerHTML = `
    <div class="ph">
      <h1>Marcador en Vivo ⛳</h1>
      <p>Anotá tus golpes hoyo por hoyo durante la ronda.</p>
    </div>

    ${!APPS_SCRIPT_URL ? `
      <div class="alert aw" style="font-size:12px">
        <strong>Aviso:</strong> No está configurada la URL de Google Sheets en Configuración Admin. El marcador guardará los datos temporalmente en la memoria, pero no se sincronizará en la nube.
      </div>
    ` : ''}

    <div class="card" style="margin-bottom: 20px;">
      <div class="fr">
        <div class="fg">
          <label class="fl">¿Quién sos?</label>
          <select class="fc" id="live-player-select" onchange="onLivePlayerChange(this.value)">
            ${selectPlayerHtml}
          </select>
        </div>
        <div class="fg">
          <label class="fl">Fecha</label>
          <select class="fc" id="live-date-select" onchange="onLiveDateChange(this.value)">
            ${selectDateHtml}
          </select>
        </div>
      </div>
    </div>

    <div id="live-scorecard-container" class="hidden"></div>
  `;

  if (livePlayerId) {
    renderLiveHolesPager();
  }
}

function onLivePlayerChange(pid) {
  if (pid === 'new_replace') {
    const selectEl = document.getElementById('live-player-select');
    if (selectEl) selectEl.value = livePlayerId || '';
    
    const name = prompt("Ingresá el Nombre completo del jugador Invitado / Reemplazo:");
    if (!name) return;
    const hcpInput = prompt("Ingresá el Handicap del jugador (0 a 54):", "20");
    if (hcpInput === null) return;
    const hcp = parseInt(hcpInput) || 0;
    
    const newPid = 'r_' + Date.now();
    
    if (!FD[liveDateNum]) {
      FD[liveDateNum] = {
        fecha: liveDateNum,
        course: COURSES[0].id,
        date: getSched(liveDateNum)?.date || '',
        lineas: [],
        scores: {}
      };
    }
    
    FD[liveDateNum].scores[newPid] = {
      hcp,
      holes: new Array(18).fill(0),
      h19: false, approach: false, hoyoEnUno: false, noApp: false, noCard: false, abandon: false, noShow: false,
      name,
      isReplace: true,
      is_official: false
    };
    
    livePlayerId = newPid;
    liveHoles = new Array(18).fill(0);
    rLive(document.getElementById('main-content'));
    return;
  }

  livePlayerId = isNaN(pid) ? pid : parseInt(pid);
  const fd = FD[liveDateNum];
  if (fd && fd.scores && fd.scores[livePlayerId]) {
    const sc = fd.scores[livePlayerId];
    liveHoles = [...sc.holes];
  } else {
    liveHoles = new Array(18).fill(0);
  }
  renderLiveHolesPager();
}

// Coordinate mobile drawer active menu closed on navigation
function onLiveDateChange(dnum) {
  liveDateNum = parseInt(dnum);
  livePlayerId = null;
  liveHoles = new Array(18).fill(0);
  rLive(document.getElementById('main-content'));
}

function renderLiveHolesPager() {
  const container = document.getElementById('live-scorecard-container');
  if (!container) return;
  container.classList.remove('hidden');

  const p = getPlayer(livePlayerId);
  if (!p) return;
  
  const fd = FD[liveDateNum];
  const courseId = fd ? fd.course : COURSES[0].id;
  const c = getCourse(courseId);
  
  let circlesHtml = '';
  for (let i = 1; i <= 18; i++) {
    const isCurrent = liveHole === i;
    const scoreVal = liveHoles[i-1];
    const hasScore = scoreVal > 0;
    
    let style = 'width:32px; height:32px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:11px; cursor:pointer; font-weight:600; border:1px solid var(--bdr); flex-shrink:0;';
    if (isCurrent) {
      style += 'background:var(--acc); color:#fff; border-color:var(--acc); transform: scale(1.15);';
    } else if (hasScore) {
      style += 'background:var(--g0); color:var(--g8); border-color:var(--g1);';
    } else {
      style += 'background:var(--surf); color:var(--tx2);';
    }
    circlesHtml += `<div style="${style}" onclick="setLiveHole(${i})">${hasScore ? scoreVal : i}</div>`;
  }

  const curPar = c.par[liveHole - 1];
  const curHdi = c.hdi[liveHole - 1];
  const curScore = liveHoles[liveHole - 1];
  const displayScore = curScore > 0 ? curScore : '-';

  const playedHolesCount = liveHoles.filter(x => x > 0).length;
  const liveGross = liveHoles.filter(x => x > 0).reduce((a, b) => a + b, 0);
  const hcp = p.hcp || 0;
  
  const liveStb = stb(liveHoles, hcp, c.par, c.hdi);
  const proratedHcp = (hcp * playedHolesCount / 18);
  const liveNeto = playedHolesCount > 0 ? Math.round(liveGross - proratedHcp) : 0;
  const vsPar = playedHolesCount > 0 ? (liveGross - c.par.slice(0, 18).reduce((sum, pVal, idx) => sum + (liveHoles[idx] > 0 ? pVal : 0), 0)) : 0;
  const vsParStr = vsPar === 0 ? 'E' : vsPar > 0 ? `+${vsPar}` : `${vsPar}`;

  let syncStatusText = 'Guardado';
  let syncStatusColor = 'var(--g7)';
  if (syncStatus === 'syncing') {
    syncStatusText = 'Sincronizando con Google Sheets...';
    syncStatusColor = 'var(--a6)';
  } else if (syncStatus === 'error') {
    syncStatusText = 'Guardado en local. Reintentando...';
    syncStatusColor = 'var(--r8)';
  } else if (syncStatus === 'idle') {
    syncStatusText = 'Listo para anotar';
    syncStatusColor = 'var(--tx2)';
  }

  container.innerHTML = `
    <div class="card" style="margin-bottom:20px; overflow-x:auto;">
      <div style="display:flex; gap:8px; padding-bottom:4px; justify-content: space-between;">
        ${circlesHtml}
      </div>
    </div>

    <div class="card" style="margin-bottom:20px; text-align:center; position:relative; overflow:hidden;">
      <div style="font-size:12px; color:var(--txm); text-transform:uppercase; letter-spacing:0.08em;">Hoyo ${liveHole}</div>
      <div style="font-size:14px; font-weight:500; margin-top:4px;">Par ${curPar} &nbsp;·&nbsp; Dificultad (HDI) ${curHdi}</div>
      
      <div style="display:flex; align-items:center; justify-content:center; gap:28px; margin:24px 0;">
        <button class="btn" style="width:54px; height:54px; border-radius:50%; font-size:24px; font-weight:600; display:flex; align-items:center; justify-content:center; border-color:var(--bdr2);" onclick="adjustLiveScore(-1)">−</button>
        <div style="font-size:64px; font-weight:600; font-family:'DM Mono',monospace; width:80px; text-align:center;">${displayScore}</div>
        <button class="btn" style="width:54px; height:54px; border-radius:50%; font-size:24px; font-weight:600; display:flex; align-items:center; justify-content:center; border-color:var(--bdr2);" onclick="adjustLiveScore(1)">+</button>
      </div>

      <div style="display:flex; justify-content:center; gap:8px; margin-bottom:12px; flex-wrap:wrap;">
        <button class="btn btn-s" onclick="setLiveScoreVal(${curPar - 1})">Birdie (${curPar - 1})</button>
        <button class="btn btn-s btn-p" onclick="setLiveScoreVal(${curPar})">Par (${curPar})</button>
        <button class="btn btn-s" onclick="setLiveScoreVal(${curPar + 1})">Bogey (${curPar + 1})</button>
        ${curScore > 0 ? `<button class="btn btn-s btn-d" onclick="setLiveScoreVal(0)">Borrar</button>` : ''}
      </div>

      <div style="border-top: 1px solid var(--bdr); margin-top:20px; padding-top:12px; display:flex; justify-content:space-between; align-items:center; font-size:12px;">
        <div style="color:${syncStatusColor}; font-weight:500;">
          <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:${syncStatusColor}; margin-right:4px;"></span>
          ${syncStatusText}
        </div>
        <div>
          Hoyos jugados: <strong>${playedHolesCount} / 18</strong>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <div class="ct">Tu Score Parcial (HCP ${hcp})</div>
      <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px; text-align:center;">
        <div style="background:var(--bg); padding:10px; border-radius:8px;">
          <div style="font-size:11px; color:var(--txm); text-transform:uppercase;">Gross Acum.</div>
          <div style="font-size:20px; font-weight:600; font-family:'DM Mono',monospace; margin-top:4px;">${liveGross}</div>
          <div style="font-size:10px; color:var(--tx2); margin-top:2px;">vs Par: ${vsParStr}</div>
        </div>
        <div style="background:var(--bg); padding:10px; border-radius:8px;">
          <div style="font-size:11px; color:var(--txm); text-transform:uppercase;">Neto Estim.</div>
          <div style="font-size:20px; font-weight:600; font-family:'DM Mono',monospace; margin-top:4px;">${liveNeto > 0 ? liveNeto : '-'}</div>
        </div>
        <div style="background:var(--bg); padding:10px; border-radius:8px; border:1px solid var(--g2)">
          <div style="font-size:11px; color:var(--g8); text-transform:uppercase; font-weight:600;">Puntos STB</div>
          <div style="font-size:20px; font-weight:700; font-family:'DM Mono',monospace; color:var(--g8); margin-top:4px;">${liveStb}</div>
        </div>
      </div>
    </div>
  `;
}

function setLiveHole(h) {
  liveHole = h;
  renderLiveHolesPager();
}

function adjustLiveScore(diff) {
  const fd = FD[liveDateNum];
  const courseId = fd ? fd.course : COURSES[0].id;
  const c = getCourse(courseId);
  const curPar = c.par[liveHole - 1];
  let cur = liveHoles[liveHole - 1];
  
  if (cur === 0) {
    cur = curPar;
  } else {
    cur += diff;
  }
  
  if (cur < 1) cur = 1;
  if (cur > 15) cur = 15;
  
  liveHoles[liveHole - 1] = cur;
  renderLiveHolesPager();
  triggerLiveSync();
}

function setLiveScoreVal(val) {
  liveHoles[liveHole - 1] = val;
  renderLiveHolesPager();
  triggerLiveSync();
}

function triggerLiveSync() {
  const fd = FD[liveDateNum];
  if (fd) {
    if (!fd.scores[livePlayerId]) {
      const p = getPlayer(livePlayerId);
      fd.scores[livePlayerId] = {
        hcp: p?.hcp || 0,
        holes: [...liveHoles],
        h19: false, approach: false, hoyoEnUno: false, noApp: false, noCard: false, abandon: false, noShow: false,
        name: p?.name || 'Jugador En Vivo',
        isReplace: p?.isReplace || false,
        is_official: false
      };
    } else {
      fd.scores[livePlayerId].holes = [...liveHoles];
      fd.scores[livePlayerId].is_official = false;
    }
  }

  if (liveSyncTimeout) clearTimeout(liveSyncTimeout);
  
  if (!APPS_SCRIPT_URL) {
    syncStatus = 'idle';
    return;
  }
  
  syncStatus = 'syncing';
  renderLiveHolesPager();
  
  liveSyncTimeout = setTimeout(async () => {
    try {
      const p = getPlayer(livePlayerId);
      const resp = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'saveLiveScore',
          dateNum: liveDateNum,
          playerId: livePlayerId,
          handicap: p?.hcp || 0,
          holes: liveHoles
        })
      });
      const data = await resp.json();
      if (data.success) {
        syncStatus = 'success';
      } else {
        syncStatus = 'error';
        console.error("Live sync failed:", data.error);
      }
    } catch (err) {
      syncStatus = 'error';
      console.error("Connection error syncing score:", err);
    }
    renderLiveHolesPager();
  }, 1200);
}

// Registrar Service Worker para soporte offline
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('✓ Service Worker registrado correctamente.', reg.scope))
      .catch(err => console.warn('⚠️ Falló la registración del Service Worker.', err));
  });
}

// Inicialización de la aplicación: Cargar desde Google Sheets y navegar al Dashboard
cargarDesdeGoogleSheets().then(() => {
  updateNavUI();
  nav('dashboard');
});
</script>
