<script>
// ════════════════════════════════════════════════════
// DATOS MAESTROS
// ════════════════════════════════════════════════════
const TP = [
  {id:1, name:'Juan Fraile',         short:'Fraile',      hcp:32, mat:'183433', ini:'JF'},
  {id:2, name:'Raúl Catalán',        short:'Catalán',     hcp:24, mat:'188549', ini:'RC'},
  {id:3, name:'Jacques Blehaut',     short:'Blehaut',     hcp:30, mat:'183435', ini:'JB'},
  {id:4, name:'Joaquín Trusso',      short:'Trusso',      hcp:25, mat:'85697',  ini:'JT'},
  {id:5, name:'Santiago Moy',        short:'Moy',         hcp:34, mat:'102536', ini:'SM'},
  {id:6, name:"Tomás D'Elía",        short:"D'Elía",      hcp:0,  mat:'110533', ini:'TD'},
  {id:7, name:'Tomás Garzón',        short:'Garzón',      hcp:18, mat:'151604', ini:'TG'},
  {id:8, name:'Juan I. Pasquinelli', short:'Pasquinelli', hcp:16, mat:'156160', ini:'JP'},
  {id:9, name:'Francisco Drago',     short:'Drago',       hcp:31, mat:'185493', ini:'FD'},
  {id:10,name:'Fermín Allemand',     short:'Allemand',    hcp:27, mat:'150128',ini:'FA'},
  {id:11,name:'Agustín Soiza',       short:'Soiza',       hcp:26, mat:'167121', ini:'AS'},
  {id:12,name:'Francisco Baumann',   short:'Baumann',     hcp:15, mat:'117902', ini:'FB'},
];

const COURSES = [
  {id:'cnsi', name:'Club Náutico San Isidro', city:'San Isidro',
   par:[4,3,4,4,4,5,4,3,4,4,4,5,4,3,5,4,3,4],
   hdi:[3,15,17,9,5,1,7,13,11,14,6,10,12,2,8,4,18,16],
   slope:113, rating:68.1}
];

const SCHED = [
  {num:1,date:'08/05/2026',course:'cnsi',status:'played',doble:false},
  {num:2,date:'05/06/2026',course:null, status:'upcoming',doble:false},
  {num:3,date:'03/07/2026',course:null, status:'pending', doble:false},
  {num:4,date:'07/08/2026',course:null, status:'pending', doble:false},
  {num:5,date:'Sep 2026',  course:null, status:'tbd',     doble:false},
  {num:6,date:'Oct 2026',  course:null, status:'tbd',     doble:true},
];

// Puntos por posición
const PTS_N={1:12,2:9,3:7,4:5,5:4,6:3,7:2,8:1};
const PTS_D={1:24,2:18,3:14,4:10,5:8,6:6,7:4,8:2};
// Laguneada: 1ro=6, 2do=3, 3ro=0
const PTS_L={1:6,2:3,3:0};

// DATOS FECHA 1 — verificados contra tarjetas reales
let FD = {
  1:{fecha:1,course:'cnsi',date:'08/05/2026',
    lineas:[
      {num:1,hora:'12:00',pids:[2,5,8,1]},
      {num:2,hora:'12:10',pids:[12,11,9,6]},
      {num:3,hora:'12:50',pids:[3,4,7]},
    ],
    scores:{
      2: {hcp:24,holes:[6,5,5,5,6,6,5,4,5,6,5,5,5,5,7,5,4,6], h19:true,approach:false,hoyoEnUno:false,noApp:false,noCard:false,abandon:false,noShow:false},
      5: {hcp:34,holes:[7,6,7,7,5,8,7,6,7,5,7,5,5,5,11,7,3,11],h19:true,approach:false,hoyoEnUno:false,noApp:false,noCard:false,abandon:false,noShow:false},
      8: {hcp:16,holes:[6,6,5,8,7,9,5,5,5,6,5,6,5,3,7,4,3,6], h19:true,approach:false,hoyoEnUno:false,noApp:false,noCard:false,abandon:false,noShow:false},
      1: {hcp:32,holes:[5,7,7,10,10,8,9,5,5,7,5,9,6,5,7,6,5,6],h19:true,approach:false,hoyoEnUno:false,noApp:false,noCard:false,abandon:false,noShow:false},
      12:{hcp:15,holes:[6,4,5,6,4,6,8,4,5,4,4,6,7,4,7,6,5,5], h19:true,approach:false,hoyoEnUno:false,noApp:false,noCard:false,abandon:false,noShow:false},
      11:{hcp:26,holes:[6,5,5,8,6,8,8,5,7,7,6,7,8,5,8,8,5,5], h19:true,approach:false,hoyoEnUno:false,noApp:false,noCard:false,abandon:false,noShow:false},
      9: {hcp:33,holes:[6,4,6,5,10,7,8,5,7,7,8,9,6,8,9,7,5,7],h19:true,approach:false,hoyoEnUno:false,noApp:false,noCard:false,abandon:false,noShow:false},
      6: {hcp:0, holes:[5,4,4,4,4,6,5,3,6,4,5,4,4,5,4,6,3,5], h19:true,approach:false,hoyoEnUno:false,noApp:false,noCard:false,abandon:false,noShow:false},
      3: {hcp:30,holes:[7,4,5,8,5,6,5,6,7,6,8,7,5,9,13,6,7,7],h19:true,approach:false,hoyoEnUno:false,noApp:false,noCard:false,abandon:false,noShow:false},
      4: {hcp:26,holes:[6,4,5,7,5,6,7,6,7,6,7,7,5,4,6,6,6,7], h19:true,approach:false,hoyoEnUno:false,noApp:false,noCard:false,abandon:false,noShow:false},
      7: {hcp:18,holes:[7,3,5,4,5,7,7,5,6,5,7,7,5,4,5,5,5,5], h19:true,approach:false,hoyoEnUno:false,noApp:false,noCard:false,abandon:false,noShow:false},
    }
  }
};

// ════════════════════════════════════════════════════
// CÁLCULOS — verificados contra Excel de Fraile (23 pts)
// Stableford: birdie(neto-1)=3, par=2, bogey=1, doble+=0
// ════════════════════════════════════════════════════
function sph(hcp, hdi){
  // Strokes per hole — distribuye handicap según orden de dificultad
  const a=new Array(18).fill(Math.floor(hcp/18));
  const ex=hcp%18;
  const sorted=[...hdi.entries?.[Symbol.iterator]?.()??hdi.map((v,i)=>({v,i}))].sort?.((x,y)=>x.v-y.v)
    ?? hdi.map((v,i)=>({v,i})).sort((x,y)=>x.v-y.v);
  // fallback simple sort
  const si=hdi.map((v,i)=>({v,i})).sort((x,y)=>x.v-y.v);
  for(let k=0;k<ex;k++) a[si[k].i]++;
  return a;
}

function stb(holes, hcp, par, hdi){
  const s=sph(hcp,hdi);
  return holes.reduce((tot,sc,i)=>{
    const diff=(sc-s[i])-par[i];
    return tot+(diff<=-1?3:diff===0?2:diff===1?1:0);
  },0);
}

function stbByHole(holes,hcp,par,hdi){
  const s=sph(hcp,hdi);
  return holes.map((sc,i)=>{const d=(sc-s[i])-par[i];return d<=-2?4:d===-1?3:d===0?2:d===1?1:0;});
}

function gross(h){return h.reduce((a,b)=>a+b,0);}
function neto(h,hcp){return gross(h)-hcp;}

function getCourse(id){return COURSES.find(c=>c.id===id)||COURSES[0];}
function getPlayer(id){return TP.find(p=>p.id==id);}
function getSched(n){return SCHED.find(s=>s.num===n);}

// ════════════════════════════════════════════════════
// ASIGNACIÓN DE PUNTOS CON EMPATES
// ════════════════════════════════════════════════════
function assignPts(ranked, doble){
  // ranked: array con .val (mayor=mejor para STB, menor=mejor para medal)
  const pm=doble?PTS_D:PTS_N;
  const out=[];
  let i=0;
  while(i<ranked.length){
    let j=i;
    while(j<ranked.length-1&&ranked[j].val===ranked[j+1].val) j++;
    const tied=ranked.slice(i,j+1);
    const ptsArr=tied.map((_,k)=>pm[i+k+1]||0);
    const positives=ptsArr.filter(x=>x>0);
    const avg=positives.length&&tied.length>1
      ? Math.round(positives.reduce((a,b)=>a+b,0)/tied.length*10)/10
      : (pm[i+1]||0);
    tied.forEach(r=>out.push({...r,pos:i+1,tpts:tied.length>1&&positives.length?avg:(pm[i+1]||0)}));
    i=j+1;
  }
  return out;
}

// ════════════════════════════════════════════════════
// RESULTADOS POR FECHA
// ════════════════════════════════════════════════════
function getFechaResults(fn){
  const fd=FD[fn]; if(!fd) return [];
  const c=getCourse(fd.course);
  return Object.entries(fd.scores).map(([pid,sc])=>{
    if(sc.noShow) return null;
    const p=getPlayer(pid);
    const g=gross(sc.holes), n=neto(sc.holes,sc.hcp);
    const s=stb(sc.holes,sc.hcp,c.par,c.hdi);
    const sched=getSched(fn), doble=sched?.doble||false;
    let bonus=0;
    if(sc.h19)      bonus+=doble?2:1;
    if(sc.approach) bonus+=doble?6:2;
    if(sc.hoyoEnUno)bonus+=doble?24:12;
    if(sc.noApp)    bonus+=doble?-2:-1;
    return{pid:parseInt(pid)||pid, p, sc, gross:g, net:n, stb:s, bonus, isReplace:sc.isReplace||false};
  }).filter(Boolean);
}

function getFechaRank(fn, mode){
  const res=getFechaResults(fn);
  const doble=getSched(fn)?.doble||false;
  const elig=res.filter(r=>!r.isReplace);
  const sorted=mode==='stb'
    ?[...elig].sort((a,b)=>b.stb-a.stb)
    :[...elig].sort((a,b)=>a.net-b.net);
  const ranked=assignPts(sorted.map(r=>({...r,val:mode==='stb'?r.stb:r.net})),doble);
  return ranked.map(r=>({...r,totalPts:r.tpts+r.bonus}));
}

// ════════════════════════════════════════════════════
// LAGUNEADA — best ball neto por línea
// ════════════════════════════════════════════════════
function getLaguneada(fn){
  const fd=FD[fn]; if(!fd||!fd.lineas) return [];
  const c=getCourse(fd.course);
  const results=fd.lineas.map(l=>{
    const bph=c.par.map((_,h)=>{
      const nets=l.pids.map(pid=>{
        const sc=fd.scores[pid];
        if(!sc||sc.noShow||!sc.holes) return 999;
        const s=sph(sc.hcp,c.hdi);
        return sc.holes[h]-s[h];
      }).filter(x=>x<999);
      return nets.length?Math.min(...nets):999;
    });
    if(bph.some(x=>x===999)) return null;
    const parTotal=c.par.reduce((a,b)=>a+b,0);
    const ida=bph.slice(0,9).reduce((a,b)=>a+b,0);
    const vta=bph.slice(9).reduce((a,b)=>a+b,0);
    const tot=bph.reduce((a,b)=>a+b,0);
    return{...l,bph,ida,vta,tot,vs:tot-parTotal};
  }).filter(Boolean);
  return results.sort((a,b)=>a.tot-b.tot).map((l,i)=>({...l,pos:i+1,lagPts:PTS_L[i+1]||0}));
}

function getAccum(){
  const map={};
  TP.forEach(p=>{map[p.id]={pid:p.id,p,stb:0,medal:0,lag:0,mixed:0,fechas:0};});
  Object.keys(FD).forEach(fn=>{
    const n=parseInt(fn);
    // STB: suma directa de puntos Stableford del jugador (no por posición)
    getFechaResults(n).filter(r=>!r.isReplace).forEach(r=>{
      if(map[r.pid]){map[r.pid].stb+=r.stb;map[r.pid].fechas++;}
    });
    // Medal pts
    getFechaRank(n,'medal').forEach(r=>{
      if(map[r.pid]) map[r.pid].medal+=r.totalPts;
    });
    // Lag pts
    getLaguneada(n).forEach(l=>{
      l.pids.forEach(pid=>{if(map[pid]) map[pid].lag+=l.lagPts;});
    });
  });
  Object.values(map).forEach(r=>{r.mixed=+(r.stb+r.lag).toFixed(1);});
  return Object.values(map).filter(x=>x.fechas>0);
}

function getPlayerStats(pid){
  // Gross results (vs par bruto, sin hcp) para medal stats
  let geagles=0,gbirdies=0,gpars=0,gbogeys=0,gdbls=0,gworse=0;
  let asist=0,h19c=0,rounds=0,appr=0,henu=0;
  let grossA=[],stbA=[],netA=[];
  const fechaDetail=[];
  Object.entries(FD).sort((a,b)=>parseInt(a[0])-parseInt(b[0])).forEach(([fn,fd])=>{
    const sc=fd.scores[pid]; if(!sc||sc.noShow) return;
    const c=getCourse(fd.course);
    rounds++;asist++;
    if(sc.h19) h19c++;
    if(sc.approach) appr++;
    if(sc.hoyoEnUno) henu++;
    const g=gross(sc.holes),n2=neto(sc.holes,sc.hcp);
    const s2=stb(sc.holes,sc.hcp,c.par,c.hdi);
    grossA.push(g);netA.push(n2);stbA.push(s2);
    let fEagles=0,fBirdies=0,fPars=0,fBogeys=0,fDbls=0,fWorse=0;
    sc.holes.forEach((h,i)=>{
      const d=h-c.par[i]; // GROSS vs par, sin hcp
      if(d<=-2){geagles++;fEagles++;}
      else if(d===-1){gbirdies++;fBirdies++;}
      else if(d===0){gpars++;fPars++;}
      else if(d===1){gbogeys++;fBogeys++;}
      else if(d===2){gdbls++;fDbls++;}
      else{gworse++;fWorse++;}
    });
    fechaDetail.push({fn:parseInt(fn),gross:g,net:n2,stb:s2,
      eagles:fEagles,birds:fBirdies,pars:fPars,bogs:fBogeys,dbls:fDbls,worse:fWorse});
  });
  const avg=a=>a.length?+(a.reduce((x,y)=>x+y,0)/a.length).toFixed(1):null;
  return{geagles,gbirdies,gpars,gbogeys,gdbls,gworse,
    asist,h19c,rounds,appr,henu,fechaDetail,
    avgGross:avg(grossA),avgStb:avg(stbA),
    bestGross:grossA.length?Math.min(...grossA):null,grossA,stbA};
}

function pb(pos){const c=pos===1?'p1':pos===2?'p2':pos===3?'p3':'pn';return`<span class="pos ${c}">${pos}</span>`;}
function ptb(pts){
  const p=typeof pts==='number'?+pts.toFixed(1):0;
  if(p===0) return`<span class="bdg bgr">0</span>`;
  if(p<0)  return`<span class="bdg br">${p}</span>`;
  return`<span class="bdg bg">+${p}</span>`;
}
function stb_badge(s){const cls=s>=30?'bg':s>=20?'bb':'bgr';return`<span class="bdg ${cls}">${s}</span>`;}
function sbdg(st){
  if(st==='played') return`<span class="bdg bg">Jugada</span>`;
  if(st==='upcoming') return`<span class="bdg ba">Próxima</span>`;
  return`<span class="bdg bgr">Pendiente</span>`;
}
function scClass(sc,par){
  if(sc<=par-2) return'se';
  if(sc===par-1) return'sb2';
  if(sc===par)   return'sp';
  if(sc===par+1) return'sbo';
  if(sc===par+2) return'sd';
  return'sw';
}
function mono(v){return`<span style="font-family:'DM Mono',monospace">${v}</span>`;}

function hDrop(e){e.preventDefault();document.getElementById('uz').classList.remove('dv');hFiles(e.dataTransfer.files);}
function hFiles(files){Array.from(files).forEach(f=>{const r=new FileReader();r.onload=ev=>analyzeImg(ev.target.result,f.name);r.readAsDataURL(f);});}

async function analyzeImg(dataUrl,fname){
  const safeId=fname.replace(/\W/g,'_');
  const uq=document.getElementById('uq');
  const div=document.createElement('div');
  div.style.cssText='display:flex;align-items:center;gap:12px;padding:10px;border:1px solid var(--bdr);border-radius:var(--rad);margin-bottom:8px;background:var(--bg)';
  div.innerHTML=`<img src="${dataUrl}" style="width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--bdr)">
    <div style="flex:1"><div style="font-size:13px;font-weight:500">${fname}</div>
    <div style="font-size:12px;color:var(--txm)" id="st-${safeId}">Analizando con IA...</div></div>
    <div id="re-${safeId}"></div>`;
  uq.appendChild(div);
  const b64=dataUrl.split(',')[1];
  const mt=dataUrl.split(';')[0].split(':')[1]||'image/jpeg';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mt,data:b64}},
          {type:'text',text:`Analizá esta tarjeta de golf. Respondé SOLO con JSON válido, sin texto adicional:\n{"playerName":"nombre","hcp":numero,"gross":numero,"holes":[18 numeros enteros en orden hoyo 1 al 18],"idaTotal":numero,"vtaTotal":numero,"courseName":"nombre cancha o null","par":[18 numeros o null],"hdi":[18 numeros o null],"date":"dd/mm/aaaa o null"}\nSi no ves el dato, usá null. Scores son números enteros positivos.`}
        ]}]})});
    const data=await resp.json();
    const txt=data.content?.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(txt);
    const matched=matchP(parsed.playerName);
    const pid=matched?matched.id:'r_'+Date.now();
    const hcp=parsed.hcp??matched?.hcp??0;
    CS.scores[pid]={hcp,holes:parsed.holes||new Array(18).fill(0),
      h19:false,approach:false,hoyoEnUno:false,noApp:false,noCard:false,abandon:false,noShow:false,
      name:parsed.playerName||'Desconocido',isReplace:!matched};
    // update course if we have par/hdi data
    const cid=document.getElementById('c-course')?.value;
    if(parsed.par?.every(p=>p!=null)&&parsed.hdi?.every(h=>h!=null)){
      const ex=COURSES.find(c=>c.id===cid);
      if(ex){ex.par=parsed.par;ex.hdi=parsed.hdi;}
    }
    document.getElementById(`st-${safeId}`).textContent=matched
      ?`✓ ${matched.name} — HCP ${hcp} — Gross ${parsed.gross}`
      :`⚠ "${parsed.playerName}" no está en el plantel — cargado como reemplazante`;
    document.getElementById(`st-${safeId}`).style.color=matched?'var(--g7)':'var(--a6)';
    document.getElementById(`re-${safeId}`).innerHTML=`<button class="btn btn-s" onclick="openSM('${pid}')">Revisar</button>`;
    rPL();
  }catch(err){
    document.getElementById(`st-${safeId}`).textContent=`Error: ${err.message}. Ingresá manualmente.`;
    document.getElementById(`st-${safeId}`).style.color='var(--r8)';
    document.getElementById(`re-${safeId}`).innerHTML=`<button class="btn btn-s" onclick="openAddP()">Manual</button>`;
  }
}

function matchP(name){
  if(!name) return null;
  const n=name.toLowerCase().trim();
  return TP.find(p=>{
    const pn=p.name.toLowerCase(),ps=p.short.toLowerCase();
    const last=pn.split(' ').pop(),nLast=n.split(' ').pop();
    return pn.includes(n)||n.includes(pn)||last===nLast||ps===n||n.includes(last);
  });
}

function onPS(s){
  document.getElementById('nf').classList.toggle('hidden',s.value!=='new');
  if(s.value!=='new'){const p=TP.find(x=>x.id===parseInt(s.value));if(p&&p.hcp!=null)document.getElementById('mh').value=p.hcp;}
}
function confAddP(){
  const sel=document.getElementById('mp').value;
  const ln=parseInt(document.getElementById('ml').value)||1;
  const hcp=parseInt(document.getElementById('mh').value)||0;
  let pid,name,isReplace=false;
  if(sel==='new'){pid='r_'+Date.now();name=document.getElementById('mn').value||'Reemplazante';isReplace=true;}
  else{pid=parseInt(sel);name=TP.find(x=>x.id===pid)?.name||'?';}
  const l=CS.lineas.find(x=>x.num===ln);
  if(l&&!l.pids.includes(pid)) l.pids.push(pid);
  CS.scores[pid]={hcp,holes:new Array(18).fill(0),h19:false,approach:false,hoyoEnUno:false,noApp:false,noCard:false,abandon:false,noShow:false,name,isReplace};

function rPL(){
  const el=document.getElementById('PL');
  const pids=Object.keys(CS.scores);
  if(!pids.length){el.innerHTML=`<div class="alert ai">Sin jugadores.</div>`;return;}
  const cid=document.getElementById('c-course')?.value||'cnsi';
  const c=getCourse(cid);
  el.innerHTML=pids.map(pid=>{
    const sc=CS.scores[pid];
    const p=getPlayer(pid);
    const name=p?.name||sc.name||'?';
    const has=sc.holes?.some(h=>h>0);
    const g=has?gross(sc.holes):0;
    const s=has?stb(sc.holes,sc.hcp,c.par,c.hdi):0;
    return`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px;border:1px solid var(--bdr);border-radius:var(--rad);margin-bottom:8px">
      <div><strong>${name}</strong>${sc.isReplace?'<span class="bdg ba" style="margin-left:6px;font-size:10px">Reemplazante</span>':''}
        <div style="font-size:12px;color:var(--txm);margin-top:2px">HCP: ${sc.hcp}${has?` · Gross: ${g} · STB: ${s}`:' · Sin score'}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-s" onclick="openSM('${pid}')">${has?'Editar':'Cargar score'}</button>
        <button class="btn btn-s btn-d" onclick="remP('${pid}')">×</button>
      </div>
    </div>`;
  }).join('');
}
function remP(pid){delete CS.scores[pid];CS.lineas.forEach(l=>{l.pids=l.pids.filter(x=>x!=pid);});rPL();}

function openSM(pid){
  const sc=CS.scores[pid];
  const p=getPlayer(pid);
  const name=p?.name||sc.name||'?';
  const cid=document.getElementById('c-course')?.value||'cnsi';
  const c=getCourse(cid);
  document.getElementById('MOD').innerHTML=`<div class="mo" onclick="closeM(event)"><div class="md" style="max-width:860px">
    <div class="mh"><h3>Tarjeta — ${name}</h3><button class="mc-btn" onclick="closeMD()">×</button></div>
    <div class="mb">
      <div class="fg"><label class="fl">HCP esta fecha</label><input class="fc" id="sh" type="number" value="${sc.hcp}" style="max-width:120px" oninput="updPrev()"></div>
      <div style="font-size:12px;color:var(--tx2);margin-bottom:8px;font-weight:500">Hoyos 1–9</div>
      <div class="sg" style="margin-bottom:12px">
        ${c.par.slice(0,9).map((par,i)=>`<div class="sc-in"><div class="hn">${i+1}</div>
          <input type="number" min="1" max="15" id="sh${i+1}" value="${sc.holes[i]>0?sc.holes[i]:''}" placeholder="${par}" oninput="cSI(this,${par});updPrev()">

      </div>
      <div style="font-size:12px;color:var(--tx2);margin-bottom:8px;font-weight:500">Hoyos 10–18</div>
      <div class="sg">
        ${c.par.slice(9).map((par,i)=>`<div class="sc-in"><div class="hn">${i+10}</div>
          <input type="number" min="1" max="15" id="sh${i+10}" value="${sc.holes[i+9]>0?sc.holes[i+9]:''}" placeholder="${par}" oninput="cSI(this,${par});updPrev()">
          <div class="hp">p${par}</div></div>`).join('')}
      </div>
      <div class="div"></div>
      <div style="font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:10px">Eventos especiales</div>
      <div class="ev-row">
        <div class="ev-tog ${sc.h19?'on':''}" id="ev-h19" onclick="this.classList.toggle('on')">Hoyo 19 (+1)</div>
        <div class="ev-tog ${sc.approach?'on':''}" id="ev-approach" onclick="this.classList.toggle('on')">Mejor approach (+2)</div>
        <div class="ev-tog ${sc.hoyoEnUno?'on':''}" id="ev-hoyoEnUno" onclick="this.classList.toggle('on')">Hoyo en uno (+12)</div>
        <div class="ev-tog pen ${sc.noApp?'on':''}" id="ev-noApp" onclick="this.classList.toggle('on')">No cargó app (−1)</div>
        <div class="ev-tog pen ${sc.noCard?'on':''}" id="ev-noCard" onclick="this.classList.toggle('on')">No presentó tarjeta (−2)</div>
        <div class="ev-tog pen ${sc.abandon?'on':''}" id="ev-abandon" onclick="this.classList.toggle('on')">Abandono (−3)</div>
        <div class="ev-tog pen ${sc.noShow?'on':''}" id="ev-noShow" onclick="this.classList.toggle('on')">No se presentó (−4)</div>
      </div>
      <div id="prev" style="margin-top:16px;padding:12px;background:var(--gray0);border-radius:var(--rad);font-size:13px;color:var(--tx2)">Ingresá scores para ver resumen.</div>
    </div>
    <div class="mf"><button class="btn" onclick="closeMD()">Cancelar</button><button class="btn btn-p" onclick="saveSM('${pid}')">Guardar tarjeta</button></div>
  </div></div>`;
  c.par.forEach((par,i)=>{const inp=document.getElementById(`sh${i+1}`);if(inp&&sc.holes[i]>0)cSI(inp,par);});
  updPrev();
}

function cSI(inp,par){
  const v=parseInt(inp.value);
  if(!isNaN(v)){
    if(v<=par-2)      inp.style.cssText='background:var(--a0);color:var(--a8);border-color:var(--a1)';
    else if(v===par-1)inp.style.cssText='background:var(--g0);color:var(--g8);border-color:var(--g1)';
    else if(v===par)  inp.style.cssText='';
    else if(v===par+1)inp.style.cssText='background:var(--b0);color:var(--b8);border-color:var(--b2)';
    else              inp.style.cssText='background:var(--r0);color:var(--r8);border-color:var(--r2)';
  }
}
function updPrev(){
  const el=document.getElementById('prev');if(!el)return;
  const cid=document.getElementById('c-course')?.value||'cnsi';
  const c=getCourse(cid);
  const holes=[],hcp=parseInt(document.getElementById('sh')?.value)||0;
  for(let i=1;i<=18;i++){const v=parseInt(document.getElementById(`sh${i}`)?.value);holes.push(isNaN(v)?c.par[i-1]:v);}
  const g=gross(holes),n=neto(holes,hcp),s=stb(holes,hcp,c.par,c.hdi);
  const pt=c.par.reduce((a,b)=>a+b,0),vp=n-pt;
  el.innerHTML=`Gross: <strong>${g}</strong> &nbsp;·&nbsp; Neto: <strong>${n}</strong> &nbsp;·&nbsp; vs Par: <strong>${vp>=0?'+'+vp:vp}</strong> &nbsp;·&nbsp; <span style="color:var(--g7);font-weight:600">Stableford: ${s} pts</span>`;
}
function saveSM(pid){
  const cid=document.getElementById('c-course')?.value||'cnsi';
  const c=getCourse(cid);
  const holes=[],hcp=parseInt(document.getElementById('sh').value)||0;
  for(let i=1;i<=18;i++){const v=parseInt(document.getElementById(`sh${i}`)?.value);holes.push(isNaN(v)?0:v);}
  const evs=['h19','approach','hoyoEnUno','noApp','noCard','abandon','noShow'];
  const ev={};evs.forEach(id=>{ev[id]=document.getElementById('ev-'+id)?.classList.contains('on')||false;});
  if(CS.scores[pid]) Object.assign(CS.scores[pid],{hcp,holes,...ev});
  closeMD();rPL();
}
function saveF(){
  const fn=parseInt(document.getElementById('c-fn').value);
  const course=document.getElementById('c-course').value;
  const date=document.getElementById('c-date').value;
  CS.lineas.forEach(l=>{const h=document.getElementById(`h-${l.num}`);if(h)l.hora=h.value;});
  FD[fn]={fecha:fn,course,date,lineas:JSON.parse(JSON.stringify(CS.lineas)),scores:{...CS.scores}};
  const sc=SCHED.find(s=>s.num===fn);if(sc){sc.status='played';if(course)sc.course=course;}
  alert(`✓ Fecha ${fn} guardada.`);nav('fechas');
}

function pctColor(pct){
  // Color by percentage: >80% green, 60-80 amber, <60 red
  if(pct>=80) return 'var(--g6)';
  if(pct>=60) return 'var(--a6)';
  return 'var(--r8)';
}

  const el=document.getElementById('SC');

  const tf=Object.keys(FD).length||1;

  if(mode==='gen'){

    el.innerHTML=`
    <div class="mg" style="margin-bottom:20px">
      <div class="mc"><div class="ml">Rondas totales</div><div class="mv">${rows.reduce((s,r)=>s+r.st.rounds,0)}</div></div>

          <th style="color:var(--b8)">Bogey+1</th>

          <th>% buenos*</th>

        </tr></thead>

          const tot=st.rounds*18||1;

function rCanchas(el){
  el.innerHTML=`
  <div class="ph"><h1>Canchas</h1><p>Datos cargados automáticamente desde las tarjetas o manualmente</p></div>
  ${COURSES.map(c=>{
    const pt=c.par.reduce((a,b)=>a+b,0);
    const pi=c.par.slice(0,9).reduce((a,b)=>a+b,0);
    const pv=c.par.slice(9).reduce((a,b)=>a+b,0);
    return`<div class="card" style="margin-bottom:20px">
      <div class="sh"><h2>${c.name}</h2><div style="display:flex;gap:8px"><span class="bdg bgr">Par ${pt}</span><span class="bdg bb">Slope ${c.slope}</span><span class="bdg bg">Rating ${c.rating}</span></div></div>
      <div class="sct"><table>
        <thead><tr><th>Hoyo</th>${c.par.map((_,i)=>`<th>${i+1}</th>`).join('')}<th>IDA</th><th>VTA</th><th>TOT</th></tr></thead>
        <tbody>
          <tr><td style="font-size:12px;color:var(--tx2)">Par</td>${c.par.map(p=>`<td style="font-family:'DM Mono',monospace;font-weight:500">${p}</td>`).join('')}<td><strong>${pi}</strong></td><td><strong>${pv}</strong></td><td><strong>${pt}</strong></td></tr>
          <tr><td style="font-size:12px;color:var(--tx2)">HCP</td>${c.hdi.map(h=>`<td style="font-size:11px;color:var(--txm);font-family:'DM Mono',monospace">${h}</td>`).join('')}<td colspan="3"></td></tr>
        </tbody>
      </table></div>
    </div>`;
  }).join('')}
  <button class="btn btn-p" onclick="openAddC()">+ Agregar cancha manualmente</button>`;
}
function openAddC(){
  document.getElementById('MOD').innerHTML=`<div class="mo" onclick="closeM(event)"><div class="md">
    <div class="mh"><h3>Agregar cancha</h3><button class="mc-btn" onclick="closeMD()">×</button></div>
    <div class="mb">
      <div class="fr">
        <div class="fg"><label class="fl">Nombre del club</label><input class="fc" id="cn" placeholder="Club de Golf XYZ"></div>
        <div class="fg"><label class="fl">Ciudad</label><input class="fc" id="cc" placeholder="Buenos Aires"></div>
      </div>
      <div class="fr">
        <div class="fg"><label class="fl">Rating</label><input class="fc" id="crt" type="number" step="0.1" placeholder="68.1"></div>
        <div class="fg"><label class="fl">Slope</label><input class="fc" id="csl" type="number" placeholder="113"></div>
      </div>
      <div style="font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:8px">Par por hoyo</div>
      <div class="sg" style="margin-bottom:10px">${[...Array(18)].map((_,i)=>`<div class="sc-in"><div class="hn">${i+1}</div><input type="number" min="3" max="6" id="cp${i+1}" placeholder="4"></div>`).join('')}</div>
      <div style="font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:8px">HCP por hoyo (1=más difícil)</div>
      <div class="sg">${[...Array(18)].map((_,i)=>`<div class="sc-in"><div class="hn">${i+1}</div><input type="number" min="1" max="18" id="ch${i+1}" placeholder="${i+1}"></div>`).join('')}</div>
    </div>
    <div class="mf"><button class="btn" onclick="closeMD()">Cancelar</button><button class="btn btn-p" onclick="saveC()">Guardar</button></div>
  </div></div>`;
}
function saveC(){
  COURSES.push({
    id:'c_'+Date.now(),
    name:document.getElementById('cn').value||'Nueva cancha',
    city:document.getElementById('cc').value||'',
    rating:parseFloat(document.getElementById('crt').value)||68.0,
    slope:parseInt(document.getElementById('csl').value)||113,
    par:[...Array(18)].map((_,i)=>parseInt(document.getElementById(`cp${i+1}`).value)||4),
    hdi:[...Array(18)].map((_,i)=>parseInt(document.getElementById(`ch${i+1}`).value)||(i+1)),
  });
  closeMD();nav('canchas');
}

nav('dashboard');
</script>
</body>
</html>
